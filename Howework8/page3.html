       <title>Contact Us</title>

        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

            </head>
        <script>
            function Checkname() {
                var name = document.getElementById("Name").value;

                if (name == "") {
                    window.alert("Please enter your name.");
                    document.getElementById("Name").style.backgroundColor = "red";
                    document.getElementById("Name").focus();
                    return false;
                }
                return true;

            }

                function CheckEmail() {
                    var email = document.getElementById("Email").value;
    
                    if (email == "") {
                        window.alert("Please enter your email.");
                        document.getElementById("Email").style.backgroundColor = "red";
                        return false;
                    }
                    return true;
    
                }
            function checkTerms() {
                var terms = document.querySelector('select').value;
                if (terms != "Yes") {
                    window.alert("You must accept the terms of agreement to proceed.");
                    return false;
                }
                return true;
            }
                function CheckForm() {
                    if (Checkname() && CheckEmail() && checkTerms() == true) {
                        window.alert("Form submitted successfully!");
                        return true;
                    }
                    return false;
                }
        

        </script>
    </head>
    <body style="background-color: lightgray;">
       
        <span><h1>Contact Us</h1></span>

            Name: <input type="text" id="Name"><br>
            Email: <input type="text" id="Email"><br>

        </select>

        <button id="mySubmit" type="button" onclick="Checkname(),CheckEmail(),checkTerms(),CheckForm()">Submit</button>
